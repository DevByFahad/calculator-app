<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Level Calculator</title>

    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="calculator-container">
        <div class="calculator">

            <!-- Display -->
            <div class="display">
                <div class="history" id="history"></div>
                <div class="output" id="output">0</div>
            </div>

            <!-- Buttons -->
            <div class="buttons">

                <button class="btn action" data-action="clear">C</button>
                <button class="btn action" data-action="delete">DEL</button>
                <button class="btn operator" data-value="/">÷</button>
                <button class="btn operator" data-value="*">×</button>

                <button class="btn number" data-value="7">7</button>
                <button class="btn number" data-value="8">8</button>
                <button class="btn number" data-value="9">9</button>
                <button class="btn operator" data-value="-">-</button>

                <button class="btn number" data-value="4">4</button>
                <button class="btn number" data-value="5">5</button>
                <button class="btn number" data-value="6">6</button>
                <button class="btn operator" data-value="+">+</button>

                <button class="btn number" data-value="1">1</button>
                <button class="btn number" data-value="2">2</button>
                <button class="btn number" data-value="3">3</button>
                <button class="btn equal">=</button>

                <button class="btn number zero" data-value="0">0</button>
                <button class="btn number" data-value=".">.</button>

            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
